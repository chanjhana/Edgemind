{{- if .Values.featureExtractor.enabled }}
# Reads pump_telemetry from InfluxDB, computes bearing health, writes pump_features.
# Set leakMode=true to trigger the memory-leak scenario.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: feature-extractor
  namespace: {{ .Values.namespaces.pumpStation }}
  labels:
    {{- include "edgemind.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: feature-extractor
  template:
    metadata:
      labels:
        app: feature-extractor
        component: pipeline
    spec:
      containers:
      - name: feature-extractor
        image: {{ include "edgemind.image" (dict "repo" .Values.featureExtractor.image "tag" .Values.featureExtractor.tag "root" .) }}
        imagePullPolicy: {{ .Values.global.imagePullPolicy }}
        env:
        - name: INFLUX_URL
          value: {{ .Values.influx.url | quote }}
        - name: INFLUX_TOKEN
          valueFrom:
            secretKeyRef:
              name: {{ .Values.influxdbToken.secretName }}
              key: {{ .Values.influxdbToken.secretKey }}
        - name: INFLUX_ORG
          value: {{ .Values.influx.org | quote }}
        - name: INFLUX_BUCKET
          value: {{ .Values.influx.bucket | quote }}
        - name: CYCLE_S
          value: {{ .Values.featureExtractor.cycleS | quote }}
        - name: WINDOW
          value: {{ .Values.featureExtractor.window | quote }}
        - name: LEAK_MODE
          value: {{ .Values.featureExtractor.leakMode | quote }}
        - name: LOG_LEVEL
          value: "INFO"
        ports:
        - containerPort: 8080
        resources:
          {{- toYaml .Values.featureExtractor.resources | nindent 10 }}
---
apiVersion: v1
kind: Service
metadata:
  name: feature-extractor-svc
  namespace: {{ .Values.namespaces.pumpStation }}
  labels:
    {{- include "edgemind.labels" . | nindent 4 }}
spec:
  selector:
    app: feature-extractor
  ports:
  - port: 8080
    targetPort: 8080
{{- end }}
