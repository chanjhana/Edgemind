{{- if .Values.influxdbToken.create }}
# InfluxDB auth token. Must match the token set in the external InfluxDB install.
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.influxdbToken.secretName }}
  namespace: {{ .Values.namespaces.pumpStation }}
  labels:
    {{- include "edgemind.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.influxdbToken.secretKey }}: {{ .Values.influxdbToken.token | quote }}
{{- end }}
