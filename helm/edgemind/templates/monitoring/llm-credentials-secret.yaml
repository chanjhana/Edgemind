{{- if .Values.llmCredentials.create }}
# LLM / Groq API key consumed by edgemind-server (GROQ_API_KEY + LLM_API_KEY).
# Only rendered when llmCredentials.create=true. Provide the key via
# --set llmCredentials.apiKey=... (or a values override / --set-file).
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.edgemindServer.llm.secretName }}
  namespace: {{ .Values.namespaces.monitoring }}
  labels:
    {{- include "edgemind.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.edgemindServer.llm.secretKey }}: {{ required "llmCredentials.apiKey is required when llmCredentials.create=true" .Values.llmCredentials.apiKey | quote }}
{{- end }}
